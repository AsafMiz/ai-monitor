# ===================================================================
# railway.toml — AI Monitor API deployment configuration
#
# IMPORTANT: The startCommand below is critical. Without it, Railway
# detects the root package.json and tries to use pnpm to start the
# app, which fails because the Docker image is python:3.12-slim.
# ===================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m uvicorn src.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
